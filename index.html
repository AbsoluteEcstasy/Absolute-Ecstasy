<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Absolute Ecstasy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="password-screen" class="overlay">
  <div class="modal">
    <h1>Absolute Ecstasy</h1>
    <p>合言葉を入力してください</p>
    <input type="password" id="password-input" placeholder="Password">
    <button id="login-btn">ENTER</button>
    <p id="password-error"></p>
  </div>
</div>

<main id="game" class="hidden">

<header class="topbar">
  <div class="logo">Absolute Ecstasy</div>

  <div class="status-right">
    <div id="character-name">榊 あぐり</div>
    <div id="love-level">好感度 Lv1</div>
    <div class="heart-counter">♡ <span id="heart-count">0</span></div>
  </div>
</header>

<section class="character-area">

  <button id="bond-btn">交歓</button>

  <div id="effect-container"></div>

  <img
    id="character"
    src="あぐり仮.png"
    alt="character"
  >

  <div class="dialogue-box">
    <p id="dialogue">タップして親密度を上げよう…♡</p>
  </div>

</section>

<div class="bottom-menu">
  <button id="gacha-btn">ガシャ</button>
  <button id="gallery-btn">ギャラリー</button>
  <button id="change-btn">⇄</button>
</div>

<section class="collection-section hidden" id="gallery-section">
  <h2>GALLERY</h2>
  <div id="card-list" class="card-list"></div>
</section>

</main>

<div id="gacha-overlay" class="overlay hidden">
  <div class="gacha-modal">
    <div class="gacha-flash"></div>
    <p class="gacha-text">NOW LOADING...</p>
    <div id="gacha-result"></div>
    <button id="close-gacha">閉じる</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
